{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Aleica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/aleica.css' %}" rel="stylesheet">
</head>
<body class="login-body">
<main class="login-shell">
    <section class="login-panel">
        <span class="eyebrow dark">Aleica Gestao</span>
        <h1>Acesse sua operacao</h1>
        {% if form.errors %}<div class="alert alert-danger">Credenciais invalidas.</div>{% endif %}
        <form method="post" class="form-stack">
            {% csrf_token %}
            <label>Email ou usuario<input class="form-control" name="username" required></label>
            <label>Senha<input class="form-control" type="password" name="password" required></label>
            <button class="btn btn-primary w-100" type="submit">Entrar</button>
        </form>
    </section>
    <section class="login-visual">
        <img src="{% static 'img/carina_banner_inicial.png' %}" alt="">
        <div><span>Gestora de Relacionamento</span><strong>Carine prioriza oportunidades com contexto, nao com achismo.</strong></div>
    </section>
</main>
</body>
</html>
